# Documentation: https://rmk.rs/docs/configuration.html
[keyboard]
name = "Cannonball LL"
product_name = "Cannonball LL"
vendor_id = 0x8884
product_id = 0x0907
manufacturer = "Taro Hayashi"
chip = "nrf52840"

# TODO: 595 SPI shift register (rmk-gpio-595 実装後に置き換え)
# 暫定: row GPIO を direct_pin で使用
[matrix]
matrix_type = "direct_pin"
direct_pins = [["P0_28", "P0_29"]]

[layout]
rows = 1
cols = 2
layers = 1
keymap = [
    [["_", "_"]]
]

[[input_device.pointing]]
interface.Spi.instance = "bitbang0"
interface.Spi.sck = "P1_10"
interface.Spi.mosi = "P0_16"
interface.Spi.miso = "P0_16"
interface.Spi.cs = "P0_10"
interface.Spi.cpi = 1200
