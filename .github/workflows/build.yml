name: Build reset-bootloader firmware

on:
  workflow_dispatch:
  push:
    paths:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
          components: llvm-tools

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-reset-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-reset-

      - name: Install flip-link
        run: cargo install flip-link

      - name: Install cargo-binutils
        run: cargo install cargo-binutils

      - name: Install cargo-hex-to-uf2
        run: cargo install cargo-hex-to-uf2

      - name: Build reset-bootloader firmware
        run: |
          cargo objcopy --release -- -O ihex reset-bootloader.hex
          cargo hex-to-uf2 --input-path reset-bootloader.hex --output-path reset-bootloader.uf2 --family nrf52840

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: reset-bootloader
          path: |
            reset-bootloader.hex
            reset-bootloader.uf2
