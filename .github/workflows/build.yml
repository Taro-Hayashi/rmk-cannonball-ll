name: Build RMK firmware

on:
  workflow_dispatch:
  push:
    paths:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
          components: llvm-tools

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install flip-link
        run: cargo install flip-link

      - name: Install cargo-binutils
        run: cargo install cargo-binutils

      - name: Install cargo-hex-to-uf2
        run: cargo install cargo-hex-to-uf2

      - name: Build firmware variants
        run: |
          cargo objcopy --release -- -O ihex rmk-cannonball-ll.hex
          cargo objcopy --release --features sensor-rotated-180 -- -O ihex rmk-cannonball-ll-sensor-rotated-180.hex

          cargo hex-to-uf2 --input-path rmk-cannonball-ll.hex --output-path rmk-cannonball-ll.uf2 --family nrf52840
          cargo hex-to-uf2 --input-path rmk-cannonball-ll-sensor-rotated-180.hex --output-path rmk-cannonball-ll-sensor-rotated-180.uf2 --family nrf52840

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rmk-cannonball-ll-firmware
          path: |
            rmk-cannonball-ll.hex
            rmk-cannonball-ll.uf2
            rmk-cannonball-ll-sensor-rotated-180.hex
            rmk-cannonball-ll-sensor-rotated-180.uf2
